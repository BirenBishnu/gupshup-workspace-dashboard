<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gupshup Workspace</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e293b 60%,#0f172a 100%);font-family:'Segoe UI',system-ui,sans-serif;color:#f1f5f9}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(15,23,42,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(148,163,184,0.1);padding:20px 48px 18px}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.brand{display:flex;align-items:center;gap:14px}
.brand-icon{background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:14px;padding:10px 12px;font-size:22px}
.brand h1{font-size:24px;font-weight:800;letter-spacing:-0.5px}
.brand p{color:#64748b;font-size:12px;margin-top:2px}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
#clock{font-size:13px;font-weight:600;color:#94a3b8}
#date{font-size:12px;color:#475569}
.header-stats{display:flex;gap:20px}
.stat{text-align:center}
.stat-num{font-size:22px;font-weight:800;color:#3b82f6}
.stat-label{font-size:10px;color:#64748b;margin-top:1px}

/* RECENTLY VISITED */
.recent-section{padding:16px 48px 0;background:rgba(15,23,42,0.6)}
.recent-label{font-size:11px;font-weight:700;color:#475569;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.recent-chips{display:flex;gap:8px;flex-wrap:wrap}
.recent-chip{display:flex;align-items:center;gap:7px;padding:5px 12px 5px 8px;background:rgba(30,41,59,0.9);border:1px solid rgba(148,163,184,0.12);border-radius:999px;text-decoration:none;color:#94a3b8;font-size:12px;font-weight:500;transition:all 0.2s;cursor:pointer}
.recent-chip:hover{border-color:rgba(59,130,246,0.4);color:#60a5fa;background:rgba(59,130,246,0.08)}
.recent-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.recent-time{font-size:10px;color:#334155;margin-left:4px}
.no-recent{color:#334155;font-size:12px;font-style:italic}

/* SEARCH + FILTERS */
.controls{padding:16px 48px 18px;background:rgba(15,23,42,0.6);border-bottom:1px solid rgba(148,163,184,0.07)}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;padding:12px 16px 12px 44px;background:#1e293b;border:1px solid rgba(148,163,184,0.15);border-radius:12px;color:#e2e8f0;font-size:14px;outline:none;transition:border-color 0.2s}
.search-wrap input:focus{border-color:#3b82f6}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:17px;height:17px;stroke:#475569;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.filters{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{padding:6px 16px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:rgba(30,41,59,0.8);color:#94a3b8;transition:all 0.2s}
.filter-btn.active{background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;box-shadow:0 4px 15px rgba(59,130,246,0.3)}
.filter-btn:hover:not(.active){background:#334155;color:#cbd5e1}

/* GRID */
main{max-width:1280px;margin:0 auto;padding:32px 48px 60px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}

/* CARD */
.card{background:rgba(30,41,59,0.55);backdrop-filter:blur(8px);border:1px solid rgba(148,163,184,0.1);border-radius:18px;padding:22px;text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:transform 0.25s,box-shadow 0.25s,border-color 0.25s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.3s;border-radius:18px;pointer-events:none}
.card:hover{transform:translateY(-5px);box-shadow:0 24px 48px rgba(0,0,0,0.45);border-color:rgba(148,163,184,0.25)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.card-icon{border-radius:13px;padding:11px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.card-icon svg{width:21px;height:21px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.card-meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.badge{background:rgba(59,130,246,0.15);color:#60a5fa;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:0.4px}
.cat-label{color:#475569;font-size:11px;font-weight:500}
.card h3{font-size:15px;font-weight:700;margin-bottom:7px;color:#f1f5f9;line-height:1.4}
.card .desc{color:#64748b;font-size:13px;line-height:1.6;flex-grow:1;margin-bottom:12px}

/* NOTES */
.note-area{margin-bottom:14px}
.note-display{font-size:12px;color:#94a3b8;background:rgba(148,163,184,0.06);border:1px solid rgba(148,163,184,0.1);border-radius:8px;padding:8px 10px;min-height:34px;cursor:text;line-height:1.5;font-style:italic;transition:border-color 0.2s}
.note-display:hover{border-color:rgba(59,130,246,0.3)}
.note-display.empty{color:#334155}
.note-input{display:none;width:100%;background:rgba(15,23,42,0.8);border:1px solid #3b82f6;border-radius:8px;padding:8px 10px;color:#e2e8f0;font-size:12px;outline:none;resize:none;font-family:inherit;line-height:1.5}
.note-actions{display:flex;gap:6px;margin-top:6px;display:none}
.note-save,.note-cancel{padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s}
.note-save{background:#3b82f6;color:#fff}
.note-save:hover{background:#2563eb}
.note-cancel{background:rgba(148,163,184,0.1);color:#94a3b8}
.note-cancel:hover{background:rgba(148,163,184,0.2)}

.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.open-btn{display:flex;align-items:center;gap:6px;color:#3b82f6;font-size:13px;font-weight:600;text-decoration:none;transition:color 0.2s}
.card:hover .open-btn{color:#60a5fa}
.arrow{transition:transform 0.2s;display:inline-block}
.card:hover .arrow{transform:translateX(4px)}
.visit-time{font-size:10px;color:#334155}

/* RECENTLY VISITED BADGE on card */
.recent-badge{position:absolute;top:12px;right:12px;background:rgba(16,185,129,0.15);color:#10b981;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:0.3px}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;color:#475569;display:none}
.empty .emoji{font-size:52px;margin-bottom:16px}
.empty h3{color:#94a3b8;margin-bottom:8px}

/* FOOTER STATS */
.footer-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:48px}
.footer-stat{background:rgba(30,41,59,0.5);border:1px solid rgba(148,163,184,0.08);border-radius:14px;padding:20px;text-align:center}
.footer-stat .num{font-size:26px;font-weight:800;margin-bottom:4px}
.footer-stat .lbl{color:#64748b;font-size:12px}

@media(max-width:640px){header,main,.recent-section,.controls{padding-left:20px;padding-right:20px}.header-top{flex-direction:column;align-items:flex-start;gap:12px}.footer-stats{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-top">
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <div>
        <h1>Gupshup Workspace</h1>
        <p>All your daily tools, unified in one place</p>
      </div>
    </div>
    <div class="header-right">
      <div id="clock"></div>
      <div id="date"></div>
      <div class="header-stats">
        <div class="stat"><div class="stat-num" id="total-count">9</div><div class="stat-label">Total</div></div>
        <div class="stat"><div class="stat-num" id="visible-count">9</div><div class="stat-label">Showing</div></div>
      </div>
    </div>
  </div>
</header>

<!-- RECENTLY VISITED -->
<div class="recent-section">
  <div class="recent-label">🕐 Recently Visited</div>
  <div class="recent-chips" id="recent-chips">
    <span class="no-recent">No recent visits yet — start clicking tools!</span>
  </div>
</div>

<!-- SEARCH + FILTERS -->
<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search tools by name, category or description..." oninput="renderGrid()"/>
  </div>
  <div class="filters" id="filters"></div>
</div>

<!-- MAIN GRID -->
<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty">
    <div class="emoji">🔍</div>
    <h3>No tools found</h3>
    <p>Try a different search term or category</p>
  </div>
  <div class="footer-stats">
    <div class="footer-stat"><div class="num" style="color:#3b82f6">9</div><div class="lbl">Tools Available</div></div>
    <div class="footer-stat"><div class="num" style="color:#8b5cf6">4</div><div class="lbl">Categories</div></div>
    <div class="footer-stat"><div class="num" style="color:#10b981" id="visit-count">0</div><div class="lbl">Visits Today</div></div>
  </div>
</main>

<script>
// ── DATA ──────────────────────────────────────────────────────
const TOOLS = [
  { id:"cep",       name:"CEP WhatsApp Searcher",     desc:"Search and analyze WhatsApp messages via CEP platform",          icon:"message-circle", gradient:"linear-gradient(135deg,#22c55e,#16a34a)", url:"http://cep-apps-02.awsfb.gupshup.me:8080/analysisUI/messages.jsp",              category:"Analytics", badge:"CEP"     },
  { id:"sms",       name:"SMS Stats",                 desc:"Get detailed SMS usage statistics and metrics",                  icon:"bar-chart",      gradient:"linear-gradient(135deg,#3b82f6,#0891b2)", url:"http://techsupport.enterprise.gupshup.me/vimal/Usage_Stats/",                  category:"Analytics", badge:"SMS"     },
  { id:"finance",   name:"Finance Dashboard",         desc:"Invoice portal, billing and financial analytics",                icon:"dollar",         gradient:"linear-gradient(135deg,#a855f7,#7c3aed)", url:"https://finance.gupshup.io/InvoicePortal/",                                    category:"Finance",   badge:"Finance" },
  { id:"gtm",       name:"GTM Buddy",                 desc:"Go-to-market strategy, planning and execution hub",             icon:"target",         gradient:"linear-gradient(135deg,#f97316,#d97706)", url:"https://gupshup.gtmbuddy.io/home",                                             category:"Strategy",  badge:"GTM"     },
  { id:"rcs",       name:"RCS Analytics",             desc:"Rich Communication Services analytics & insights",              icon:"radio",          gradient:"linear-gradient(135deg,#ec4899,#e11d48)", url:"https://rbm.gupshup.io/",                                                      category:"Analytics", badge:"RCS"     },
  { id:"wasearch",  name:"WhatsApp Message Searcher", desc:"Internal advanced WhatsApp message search tool",                icon:"message-square", gradient:"linear-gradient(135deg,#14b8a6,#0891b2)", url:"http://10.32.162.201/messagesearcher",                                          category:"Analytics", badge:"Search"  },
  { id:"revenue",   name:"Revenue Predictor",         desc:"CPaaS revenue forecasting & intelligent predictions",           icon:"trending-up",    gradient:"linear-gradient(135deg,#6366f1,#3b82f6)", url:"https://finance-int.gupshup.io/gmpredictor/cpaas-revenue",                     category:"Finance",   badge:"Predict" },
  { id:"metabase",  name:"MetaBase Reports",          desc:"WhatsApp finance dashboard & business reports",                 icon:"database",       gradient:"linear-gradient(135deg,#ef4444,#dc2626)", url:"https://sk.gsbiml.in/dashboard/768-finance-dashboard-internal-ist",            category:"Finance",   badge:"Reports" },
  { id:"mmlite",    name:"MMLite Account Manager",    desc:"Check and manage MMLite accounts with WABA ID",                icon:"settings",       gradient:"linear-gradient(135deg,#64748b,#475569)", url:"http://techsupport.awsfb.gupshup.me/GenericUI/",                               category:"Admin",     badge:"Config"  },
];

const ICONS = {
  "message-circle": `<circle cx="12" cy="12" r="10"/><path d="M8 12h.01M12 12h.01M16 12h.01M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>`,
  "bar-chart":      `<line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/>`,
  "dollar":         `<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>`,
  "target":         `<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>`,
  "radio":          `<circle cx="12" cy="12" r="2"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14M19.07 4.93a10 10 0 0 1 0 14.14M7.76 7.76a6 6 0 0 0 0 8.49M16.24 7.76a6 6 0 0 1 0 8.49"/>`,
  "message-square": `<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>`,
  "trending-up":    `<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>`,
  "database":       `<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>`,
  "settings":       `<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>`
};

// ── STATE ──────────────────────────────────────────────────────
let activeCategory = "All";
let notes   = JSON.parse(localStorage.getItem("gs_notes")   || "{}");
let recent  = JSON.parse(localStorage.getItem("gs_recent")  || "[]");
let visits  = JSON.parse(localStorage.getItem("gs_visits")  || "{}");

// ── CLOCK ──────────────────────────────────────────────────────
function updateClock(){
  const n = new Date();
  document.getElementById("clock").textContent = n.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  document.getElementById("date").textContent  = n.toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
}
updateClock(); setInterval(updateClock, 1000);

// ── VISIT TRACKING ─────────────────────────────────────────────
function trackVisit(id, name, gradient){
  const now = Date.now();
  // recent list (last 5 unique)
  recent = [{ id, name, gradient, time: now }, ...recent.filter(r=>r.id!==id)].slice(0,5);
  localStorage.setItem("gs_recent", JSON.stringify(recent));
  // daily visit count
  const today = new Date().toDateString();
  if(!visits[today]) visits[today] = 0;
  visits[today]++;
  localStorage.setItem("gs_visits", JSON.stringify(visits));
  renderRecent(); updateVisitCount();
}

function updateVisitCount(){
  const today = new Date().toDateString();
  document.getElementById("visit-count").textContent = visits[today] || 0;
}

// ── RECENT CHIPS ───────────────────────────────────────────────
function timeAgo(ts){
  const diff = Math.floor((Date.now()-ts)/1000);
  if(diff<60)  return "just now";
  if(diff<3600) return Math.floor(diff/60)+"m ago";
  if(diff<86400) return Math.floor(diff/3600)+"h ago";
  return Math.floor(diff/86400)+"d ago";
}

function renderRecent(){
  const el = document.getElementById("recent-chips");
  if(!recent.length){ el.innerHTML='<span class="no-recent">No recent visits yet — start clicking tools!</span>'; return; }
  el.innerHTML = recent.map(r=>`
    <a class="recent-chip" href="${TOOLS.find(t=>t.id===r.id)?.url||'#'}" target="_blank" rel="noopener noreferrer"
       onclick="trackVisit('${r.id}','${r.name}','${r.gradient}')">
      <span class="recent-dot" style="background:${r.gradient.match(/#[a-f0-9]+/i)?.[0]||'#3b82f6'}"></span>
      ${r.name}
      <span class="recent-time">${timeAgo(r.time)}</span>
    </a>
  `).join('');
}

// ── FILTERS ───────────────────────────────────────────────────
function renderFilters(){
  const cats = ["All", ...new Set(TOOLS.map(t=>t.category))];
  document.getElementById("filters").innerHTML = cats.map(c=>
    `<button class="filter-btn ${c===activeCategory?'active':''}" onclick="setCategory('${c}')">${c}</button>`
  ).join('');
}

function setCategory(cat){ activeCategory=cat; renderFilters(); renderGrid(); }

// ── NOTES ─────────────────────────────────────────────────────
function editNote(id){
  const display = document.getElementById(`note-display-${id}`);
  const input   = document.getElementById(`note-input-${id}`);
  const actions = document.getElementById(`note-actions-${id}`);
  display.style.display="none";
  input.style.display="block";
  actions.style.display="flex";
  input.focus();
}

function saveNote(id){
  const input = document.getElementById(`note-input-${id}`);
  notes[id] = input.value.trim();
  localStorage.setItem("gs_notes", JSON.stringify(notes));
  cancelNote(id);
  renderGrid();
}

function cancelNote(id){
  document.getElementById(`note-display-${id}`).style.display="block";
  document.getElementById(`note-input-${id}`).style.display="none";
  document.getElementById(`note-actions-${id}`).style.display="none";
}

// ── GRID ─────────────────────────────────────────────────────
function renderGrid(){
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = TOOLS.filter(t=>
    (activeCategory==="All" || t.category===activeCategory) &&
    (t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.category.toLowerCase().includes(q))
  );

  document.getElementById("visible-count").textContent = filtered.length;
  const grid  = document.getElementById("grid");
  const empty = document.getElementById("empty");

  if(!filtered.length){ grid.innerHTML=""; empty.style.display="block"; return; }
  empty.style.display="none";

  const recentIds = recent.map(r=>r.id);
  const recentVisit = (id)=> recentIds.includes(id) ? `<span class="recent-badge">Recent</span>` : '';
  const visitInfo = (id)=>{
    const r = recent.find(x=>x.id===id);
    return r ? `<span class="visit-time">Last: ${timeAgo(r.time)}</span>` : '';
  };

  grid.innerHTML = filtered.map(t=>{
    const note = notes[t.id]||"";
    return `
    <div class="card" style="cursor:default">
      ${recentVisit(t.id)}
      <div class="card-top">
        <div class="card-icon" style="background:${t.gradient}">
          <svg viewBox="0 0 24 24">${ICONS[t.icon]}</svg>
        </div>
        <div class="card-meta">
          <span class="badge">${t.badge}</span>
          <span class="cat-label">${t.category}</span>
        </div>
      </div>
      <h3>${t.name}</h3>
      <p class="desc">${t.desc}</p>

      <div class="note-area">
        <div id="note-display-${t.id}" class="note-display ${!note?'empty':''}" onclick="editNote('${t.id}')">
          ${note || '✏️ Click to add a note...'}
        </div>
        <textarea id="note-input-${t.id}" class="note-input" rows="2" placeholder="Add your custom note here...">${note}</textarea>
        <div id="note-actions-${t.id}" class="note-actions">
          <button class="note-save" onclick="saveNote('${t.id}')">Save</button>
          <button class="note-cancel" onclick="cancelNote('${t.id}')">Cancel</button>
        </div>
      </div>

      <div class="card-footer">
        <a class="open-btn" href="${t.url}" target="_blank" rel="noopener noreferrer"
           onclick="trackVisit('${t.id}','${t.name}','${t.gradient}')">
          Open Tool <span class="arrow">→</span>
        </a>
        ${visitInfo(t.id)}
      </div>
    </div>`;
  }).join('');
}

// ── INIT ──────────────────────────────────────────────────────
renderFilters();
renderRecent();
renderGrid();
updateVisitCount();
</script>
</body>
</html>
